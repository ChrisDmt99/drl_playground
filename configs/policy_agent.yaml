env_name: "FrozenLake-v1"
is_slippery: false
render_mode: "rgb_array" # "human" for visualization, "rgb_array" for headless mode
episodes: 5000
seed: 42

policy_agent_params:
  policy: "thompson_sampling" # ["epsilon_greedy", "softmax", "ucb", "thompson_sampling"]

  epsilon_greedy_params:
    init_epsilon: 1.0
    min_epsilon: 0.01
    decay_rate: 0.9
    decay_law: "exponential" # "exponential" or "linear"

  softmax_params:
    init_temperature: 1.0
    min_temperature: 0.01
    decay_rate: 0.99
    decay_law: "exponential" # "exponential" or "linear"

  ucb_params:
    c: 0.9 # A higher value encourages more exploration, while a lower value encourages more exploitation. The optimal value of c can depend on the specific environment and the scale of the rewards.

  thompson_sampling_params:
    alpha: 1.0 # Alpha controls the scale of the distribution
    beta: 1.0 # Beta controls the shift such that the standard deviation shrinks more slowly.
